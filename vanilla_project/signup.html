<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up | ReelCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 20px 60px; }
        .auth-card { background: #16161d; border: 1px solid #252531; padding: 40px; border-radius: 20px; width: 100%; max-width: 480px; text-align: center; }
        .input-field { width: 100%; padding: 14px 16px; background: #0f0f13; border: 1px solid #252531; border-radius: 8px; color: white; font-size: 1rem; outline: none; margin-bottom: 12px; box-sizing: border-box; }
        .input-field:focus { border-color: #7c3aed; }
        .badge-purple { background: rgba(124,58,237,0.1); color: #7c3aed; padding: 6px 16px; border-radius: 100px; font-size: 0.85rem; font-weight: 600; display: inline-block; margin-bottom: 1.5rem; }
        .auth-footer-text { margin-top: 24px; color: #7a7890; font-size: 0.95rem; }
        .text-purple { color: #7c3aed; text-decoration: none; }
        .signup-btn { width: 100%; padding: 14px; background: #7c3aed; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 4px; }
        .signup-btn:hover { background: #6d28d9; }
        .error-msg { color: #e24b4a; font-size: 0.9rem; margin-top: 8px; display: none; }
        .success-msg { color: #22c55e; font-size: 0.9rem; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">ReelCraft</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="login.html">Log in</a></li>
            </ul>
            <a href="signup.html" class="btn btn-primary">Get started free</a>
        </div>
    </nav>

    <div class="auth-section">
        <div class="auth-card">
            <span class="badge-purple">Get started free</span>
            <h2 style="font-size: 2rem; color: white; margin-bottom: 0.5rem;">Create your ReelCraft account</h2>
            <p style="color: #7a7890; margin-bottom: 0;">Start editing Reels in minutes</p>
            <div style="margin-top: 30px;">
                <input type="text" id="name" placeholder="Your full name" class="input-field">
                <input type="email" id="email" placeholder="Enter your email" class="input-field">
                <input type="password" id="password" placeholder="Create a password (min 6 chars)" class="input-field">
                <div id="errorMsg" class="error-msg"></div>
                <div id="successMsg" class="success-msg"></div>
                <button class="signup-btn" onclick="doSignup()">Create free account</button>
                <button class="signup-btn" style="background:#fff; color:#000; margin-top:12px; display:flex; align-items:center; justify-content:center; gap:8px;" onclick="doGoogle()">
                    <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/><path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/><path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/><path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/></svg>
                    Continue with Google
                </button>
            </div>
            <p class="auth-footer-text">Already have an account? <a href="login.html" class="text-purple">Log in</a></p>
        </div>
    </div>

    <footer class="footer">
        <div class="container footer-content">
            <div class="logo">ReelCraft</div>
            <p class="footer-msg">Built for small creators. Free to start.</p>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Contact</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://uqhsumymxsdzshxhsuma.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxaHN1bXlteHNkenNoeGhzdW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTM1MzIsImV4cCI6MjA4OTk4OTUzMn0.uoIzMauVrGnNHoysnOD5dK20f0EAFanP9Jcf4GbycK0'
        );

        async function doGoogle() {
            await _supabase.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: 'https://reel-craft.vercel.app/dashboard.html' } });
        }

        async function doSignup() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!email || !password) {
                errorMsg.textContent = 'Please fill in required fields';
                errorMsg.style.display = 'block';
                return;
            }

            const { data, error } = await _supabase.auth.signUp({
                email: email,
                password: password
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } else {
                successMsg.textContent = 'Account created! Redirecting...';
                successMsg.style.display = 'block';
                setTimeout(() => { window.location.href = 'dashboard.html'; }, 1500);
            }
        }
    </script>
</body>
</html>
