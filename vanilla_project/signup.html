<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up | ReelCraft</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 100px 20px 60px; }
        .auth-card { background: #16161d; border: 1px solid #252531; padding: 40px; border-radius: 20px; width: 100%; max-width: 480px; text-align: center; }
        .input-field { width: 100%; padding: 14px 16px; background: #0f0f13; border: 1px solid #252531; border-radius: 8px; color: white; font-size: 1rem; outline: none; margin-bottom: 12px; box-sizing: border-box; }
        .input-field:focus { border-color: #7c3aed; }
        .badge-purple { background: rgba(124,58,237,0.1); color: #7c3aed; padding: 6px 16px; border-radius: 100px; font-size: 0.85rem; font-weight: 600; display: inline-block; margin-bottom: 1.5rem; }
        .auth-footer-text { margin-top: 24px; color: #7a7890; font-size: 0.95rem; }
        .text-purple { color: #7c3aed; text-decoration: none; }
        .signup-btn { width: 100%; padding: 14px; background: #7c3aed; color: white; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 4px; }
        .signup-btn:hover { background: #6d28d9; }
        .error-msg { color: #e24b4a; font-size: 0.9rem; margin-top: 8px; display: none; }
        .success-msg { color: #22c55e; font-size: 0.9rem; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container navbar-content">
            <a href="index.html" class="logo">ReelCraft</a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="index.html#features">Features</a></li>
                <li><a href="pricing.html">Pricing</a></li>
                <li><a href="dashboard.html">Dashboard</a></li>
                <li><a href="login.html">Log in</a></li>
            </ul>
            <a href="signup.html" class="btn btn-primary">Get started free</a>
        </div>
    </nav>

    <div class="auth-section">
        <div class="auth-card">
            <span class="badge-purple">Get started free</span>
            <h2 style="font-size: 2rem; color: white; margin-bottom: 0.5rem;">Create your ReelCraft account</h2>
            <p style="color: #7a7890; margin-bottom: 0;">Start editing Reels in minutes</p>
            <div style="margin-top: 30px;">
                <input type="text" id="name" placeholder="Your full name" class="input-field">
                <input type="email" id="email" placeholder="Enter your email" class="input-field">
                <input type="password" id="password" placeholder="Create a password (min 6 chars)" class="input-field">
                <div id="errorMsg" class="error-msg"></div>
                <div id="successMsg" class="success-msg"></div>
                <button class="signup-btn" onclick="doSignup()">Create free account</button>
            </div>
            <p class="auth-footer-text">Already have an account? <a href="login.html" class="text-purple">Log in</a></p>
        </div>
    </div>

    <footer class="footer">
        <div class="container footer-content">
            <div class="logo">ReelCraft</div>
            <p class="footer-msg">Built for small creators. Free to start.</p>
            <div class="footer-links">
                <a href="#">Privacy</a>
                <a href="#">Terms</a>
                <a href="#">Contact</a>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script>
        const _supabase = supabase.createClient(
            'https://uqhsumymxsdzshxhsuma.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVxaHN1bXlteHNkenNoeGhzdW1hIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ0MTM1MzIsImV4cCI6MjA4OTk4OTUzMn0.uoIzMauVrGnNHoysnOD5dK20f0EAFanP9Jcf4GbycK0'
        );

        async function doSignup() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            const successMsg = document.getElementById('successMsg');
            errorMsg.style.display = 'none';
            successMsg.style.display = 'none';

            if (!name || !email || !password) {
                errorMsg.textContent = 'Please fill in all fields';
                errorMsg.style.display = 'block';
                return;
            }
            if (password.length < 6) {
                errorMsg.textContent = 'Password must be at least 6 characters';
                errorMsg.style.display = 'block';
                return;
            }

            const { data, error } = await _supabase.auth.signUp({
                email: email,
                password: password,
                options: { data: { full_name: name } }
            });

            if (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } else {
                successMsg.textContent = 'Account created! Taking you to the editor...';
                successMsg.style.display = 'block';
                setTimeout(() => { window.location.href = 'upload.html'; }, 2000);
            }
        }
    </script>
</body>
</html>
